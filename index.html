<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Wallet UI</title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  
<div class="card">
  <header class="header">
    <div class="content">
      <div class="wallet">
        <div class="icon-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1"></path>
            <path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4"></path>
          </svg>
        </div>
        <div class="text">
          <p class="title">Wallet</p>
          <p class="balance">₵550.00</p>
        </div>
      </div>
      <label class="close">
        <input type="checkbox" id="card-toggle" class="toggle-checkbox" checked="" />
        <svg class="close-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 6 6 18"></path>
          <path d="m6 6 12 12"></path>
        </svg>
      </label>
    </div>
  </header>
  <div class="content">
    <div class="header">
      <p class="title">Payment Mode</p>
      <button class="add-card-button">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="add-card-icon">
          <rect width="20" height="14" x="2" y="5" rx="2"></rect>
          <path d="M2 10h20"></path>
        </svg>
        Add Card
      </button>
    </div>
    <div class="bank-cards">
      <label class="bank-card">
        <div class="number">
          <input type="radio" id="value-1" name="value-radio" value="value-1" class="input" checked="" />
          <span class="custom-radio"></span>
          <p class="card-number">*****6380</p>
        </div>
        <p class="type">VISA</p>
      </label>
      <label class="bank-card">
        <div class="number">
          <input type="radio" id="value-2" name="value-radio" value="value-2" class="input" />
          <span class="custom-radio"></span>
          <p class="card-number">*****8053</p>
        </div>
        <p class="type">VISA</p>
      </label>
    </div>
    <footer class="footer">
      <div class="cash">
        <p class="cash-title">Cash</p>
        <div class="blocks">
          <div class="block">₵50</div>
          <div class="block">₵100</div>
          <div class="block">₵200</div>
        </div>
      </div>
    </footer>
  </div>
  <label for="card-toggle" class="add-cash-button">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="add-card-button-icon">
      <path d="M5 12h14"></path>
      <path d="M12 5v14"></path>
    </svg>
    Add Cash
  </label>
</div>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/4.1.13/lib.min.js'></script>
  </body>
  
</html>
